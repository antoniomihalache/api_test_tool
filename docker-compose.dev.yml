services:
  backend:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      - NODE_ENV=development
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:ro
    environment:
      - VITE_API_URL=http://localhost:4000
    command: npm run dev
