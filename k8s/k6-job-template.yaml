apiVersion: batch/v1
kind: Job
metadata:
  name: k6-manual-template
  namespace: perf-tests
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          args: ["run", "--out", "experimental-prometheus-rw", "/scripts/test.js"]
          env:
            - name: BASE_URL
              value: "http://target-service"
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: "http://prometheus:9090/api/v1/write"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: k6-script-config
